<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batuhan Das - iOS Apps</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #1C1510;
            color: #F5F0E8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .developer {
            color: #A89880;
            font-size: 14px;
            margin-bottom: 48px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .apps {
            display: flex;
            flex-direction: column;
            gap: 24px;
            width: 100%;
            max-width: 480px;
        }
        .app-card {
            background: #2A2118;
            border: 1px solid #3A3028;
            border-radius: 16px;
            padding: 24px;
        }
        .app-name {
            color: #C9A84C;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .app-desc {
            color: #A89880;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .links { display: flex; gap: 16px; }
        .links a {
            color: #C9A84C;
            text-decoration: none;
            font-size: 13px;
            opacity: 0.8;
        }
        .links a:hover { opacity: 1; }
    </style>
</head>
<body>
    <p class="developer">Batuhan Das · iOS Apps</p>

    <div class="apps">
        <div class="app-card">
            <div class="app-name">ColorPick</div>
            <div class="app-desc">Color Identifier App for iOS</div>
            <div class="links">
                <a href="/colorpick-legal/privacy.html">Privacy Policy</a>
                <a href="/colorpick-legal/terms.html">Terms of Service</a>
            </div>
        </div>

        <div class="app-card">
            <div class="app-name">WiseCal</div>
            <div class="app-desc">Smart Calendar App for iOS</div>
            <div class="links">
                <a href="/wisecal-legal/privacy.html">Privacy Policy</a>
                <a href="/wisecal-legal/terms.html">Terms of Service</a>
            </div>
        </div>
    </div>
</body>
</html>
