<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batuhan Das - iOS Apps</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        header {
            text-align: center;
            margin-bottom: 48px;
        }
        header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1d1d1f;
            margin-bottom: 6px;
        }
        header p {
            font-size: 15px;
            color: #6e6e73;
        }
        .apps {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 480px;
        }
        .app-card {
            background: #ffffff;
            border: 1px solid #e0e0e5;
            border-radius: 16px;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .app-icon {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            background: #e8e8ed;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }
        .app-info { flex: 1; }
        .app-name {
            font-size: 17px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 3px;
        }
        .app-desc {
            font-size: 13px;
            color: #6e6e73;
            margin-bottom: 10px;
        }
        .links { display: flex; gap: 14px; }
        .links a {
            color: #0071e3;
            text-decoration: none;
            font-size: 12px;
        }
        .links a:hover { text-decoration: underline; }
        footer {
            margin-top: 48px;
            font-size: 12px;
            color: #aeaeb2;
        }
    </style>
</head>
<body>
    <header>
        <h1>Batuhan Das</h1>
        <p>iOS Developer</p>
    </header>

    <div class="apps">
        <div class="app-card">
            <div class="app-icon">🎨</div>
            <div class="app-info">
                <div class="app-name">ColorPick</div>
                <div class="app-desc">Color Identifier App for iOS</div>
                <div class="links">
                    <a href="/colorpick-legal/privacy.html">Privacy Policy</a>
                    <a href="/colorpick-legal/terms.html">Terms of Service</a>
                </div>
            </div>
        </div>

        <div class="app-card">
            <div class="app-icon">📅</div>
            <div class="app-info">
                <div class="app-name">WiseCal</div>
                <div class="app-desc">Smart Calendar App for iOS</div>
                <div class="links">
                    <a href="/wisecal-legal/privacy.html">Privacy Policy</a>
                    <a href="/wisecal-legal/terms.html">Terms of Service</a>
                </div>
            </div>
        </div>

        <div class="app-card">
            <div class="app-icon">⏳</div>
            <div class="app-info">
                <div class="app-name">Day Counter Streak</div>
                <div class="app-desc">Countdown & Streak Tracker for iOS</div>
                <div class="links">
                    <a href="/dayCounter-Legal/privacy.html">Privacy Policy</a>
                    <a href="/dayCounter-Legal/support.html">Support</a>
                </div>
            </div>
        </div>
    </div>

    <footer>© 2026 Batuhan Das</footer>
</body>
</html>
